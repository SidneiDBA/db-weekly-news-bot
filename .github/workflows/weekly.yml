name: Weekly DB News Bot

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python src/main.py

      - name: Upload weekly brief
        uses: actions/upload-artifact@v4
        with:
          name: weekly-db-brief
          path: output/weekly_brief.md